        skill_id: 10   # kick
      - level: 5
        skill_id: 11   # bash
      - level: 10
        skill_id: 21   # taunt
      - level: 15
        skill_id: 15   # second attack
      - level: 20
        skill_id: 13   # parry
      - level: 25
        skill_id: 16   # third attack
      - level: 30
