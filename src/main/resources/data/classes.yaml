# Character Classes for TassMUD
# Each class defines stat bonuses per level and skill availability.
# Levels 1-50 are normal, 51-55 are hero levels.
# Characters need 1000 XP per level.

classes:
  # ============================================================
  # FIGHTER - Melee combat specialist
  # High HP, moderate MV, low MP
  # ============================================================
  - id: 1
    name: Fighter
    description: >
      Masters of martial combat, fighters excel in physical confrontation.
      They gain the most hit points per level and have access to a wide
      variety of weapon and armor proficiencies.
    hp_level: 12
    mp_level: 0
    mv_level: 6
    skills:
      - level: 1
        skill_id: 900  # simple weapons (all classes)
      - level: 1
        skill_id: 952  # mail armor
      - level: 1
        skill_id: 19   # shields
      - level: 1
        skill_id: 901  # martial weapons
